<!DOCTYPE html>
<html>

<head>

    <title>HDI Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🌍 Human Development Index</h1>

        <h2>HDI Prediction System</h2>

        <form action="/predict" method="POST">

            <input
                type="number"
                step="any"
                name="life_expectancy"
                placeholder="Life Expectancy at Birth"
                required>

            <input
                type="number"
                step="any"
                name="expected_schooling"
                placeholder="Expected Years of Schooling"
                required>

            <input
                type="number"
                step="any"
                name="mean_schooling"
                placeholder="Mean Years of Schooling"
                required>

            <input
                type="number"
                step="any"
                name="gni"
                placeholder="Gross National Income (GNI)"
                required>

            <button type="submit">

                Predict HDI

            </button>

        </form>

    </div>

</div>

</body>

</html>
